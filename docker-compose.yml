# Single-service serving for the WM-811K classifier (T10).
#
# NOTE vs the original T10 sketch: that sketch mounted ${PWD} into the container
# because it assumed serving loaded the model through MLflow, whose artifact URI
# is an absolute host path. This design does NOT -- serving loads a .pt baked
# into the image from the GitHub Release -- so there is no volume mount and no
# second service. The registry (mlflow.db + mlruns/) stays on the host as the
# decision layer; it is not needed at serving time. Simpler and portable.

services:
  serve:
    build:
      context: .
      dockerfile: Dockerfile
    image: wm811k-serve:model-v1
    ports:
      - "8000:8000"
    healthcheck:
      # Uses the /health endpoint; container is "healthy" only once the model
      # has loaded (model_loaded=true is implied by a 200 with status ok).
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
